<h1>SDL_isinff</h1>
数値が無限であるかチェックする
<h2>ヘッダ</h2>
<a href="https://github.com/libsdl-org/SDL/blob/main/include/SDL3/SDL_stdinc.h">SDL3/SDL_stdinc.h</a>
<h2>構文</h2>
<code>int SDL_isinff(float x);</code>
<h2>引数</h2>
<table border="1">
<tr><td>float</td><td>x</td><td>単精度浮動小数点の値</td></tr>
</table>
<h2>戻り値</h2>
<p>
(int) 値が無限のとき0以外, 無限でないとき0を戻す.
</p>
<h2>スレッドセーフ</h2>
<p>
この関数はどのスレッドからも安全に呼べる.
</p>
<h2>バージョン</h2>
SDL 3.2.0以降
